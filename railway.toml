[template]
name = "unkey-api-management-pro"
description = "Production-ready Unkey.dev deployment with MySQL, Redis, and zero-config setup."
tags = ["api", "unkey", "auth", "keys", "saas"]

[services.unkey]
source = "https://github.com/unkeyed/unkey"
startCommand = "pnpm start"

[services.unkey.variables]
UNKEY_ROOT_KEY = "${{UNKEY_ROOT_KEY}}"
UNKEY_DATABASE_PRIMARY = "mysql://root:${{MYSQL_PASSWORD}}@mysql:3306/unkey"
UNKEY_REDIS_URL = "redis://redis:6379"

[services.unkey.healthcheck]
path = "/v1/health"
interval = 15

[services.mysql]
image = "mysql:8.0"

[services.mysql.variables]
MYSQL_ROOT_PASSWORD = "${{MYSQL_PASSWORD}}"
MYSQL_DATABASE = "unkey"

[services.redis]
image = "redis:7"

[variables]
UNKEY_ROOT_KEY = { 
  description = "Root key for Unkey admin access",
  default = "${{random.hex(32)}}"
}

MYSQL_PASSWORD = { 
  description = "MySQL root password",
  default = "${{random.hex(16)}}"
}
